# snRNAseq Pipeline Config — HPC, Pearson residuals HVG, chemistry-level batch correction
#
# Identical to dataset_hpc_config.yaml except:
#   - output_dir: VelWangPsychAD_100k_chemistry
#   - batch_key / hvg_batch_key: chemistry (instead of dataset)
#     VELMESHEV sub-datasets have multiple chemistries (from TSV 'Chemistry' column);
#     WANG is all 'multiome'; AGING and HBCC are both 'V3'.
#   - transform_batch: multiome (WANG reference — same rationale as before)
#   - steps: scvi only (combined.h5ad is symlinked from VelWangPsychAD_100k_dataset)
#
# Submit via:
#   cd /home/rajd2/rds/hpc-work/snRNAseq_2026
#   bash code/pipeline/slurm/submit_pipeline.sh code/pipeline/chemistry_hpc_config.yaml

output_dir: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/VelWangPsychAD_100k_chemistry

sources:
  - name: WANG
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/wang/wang.h5ad
    dataset_type: Wang
    cell_type_field: "Type_updated"
    pfc_only: true
    n_cells: 100000

  - name: VELMESHEV
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/velmeshev/velmeshev.h5ad
    dataset_type: Velmeshev
    cell_type_field: "Cell_Type"
    pfc_only: true
    n_cells: 100000

  - name: AGING
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/Aging_Cohort.h5ad
    dataset_type: Aging
    cell_type_field: "subclass"
    pfc_only: true
    n_cells: 100000

  - name: HBCC
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/HBCC_Cohort.h5ad
    dataset_type: HBCC
    cell_type_field: "subclass"
    pfc_only: true
    n_cells: 100000

age_downsample: true
seed: 42

scvi:
  n_top_genes: 10000
  hvg_flavor: pearson_residuals
  hvg_batch_key: chemistry
  batch_key: chemistry
  n_latent: 30
  max_epochs_scvi: 400
  batch_size: 256
  early_stopping: true
  early_stopping_patience: 20
  num_workers: 4
  transform_batch: multiome    # normalize all cells as multiome (WANG chemistry) for GRN scoring
  save_npy_backup: false       # npy files are ~6GB each and not required downstream

scanvi_label_transfer:
  enabled: true
  label_column: cell_type_for_scanvi
  max_epochs_scanvi: 100
  confidence_threshold: 0.5

pseudobulk:
  layers:
    - name: counts
      aggregation: sum
    - name: scvi_normalized
      aggregation: mean
    - name: scanvi_normalized
      aggregation: mean
  min_cells: 10
  groups:
    - name: all_cells_by_donor
      group_cols: [individual]

    - name: by_cell_class
      group_cols: [individual, cell_class]

    - name: excitatory_by_celltype
      group_cols: [individual, cell_type_aligned]
      filter:
        cell_class: Excitatory

    - name: inhibitory_by_celltype
      group_cols: [individual, cell_type_aligned]
      filter:
        cell_class: Inhibitory

steps:
  - scvi
  - pseudobulk
overwrite: false
