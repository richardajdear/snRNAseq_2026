# snRNAseq Pipeline Config — HPC, Pearson residuals HVG selection
#
# Identical to hpc_config.yaml except:
#   - output_dir: VelWangPsychAD_100k_pearson
#   - hvg_flavor: pearson_residuals (no skmisc dependency; uses raw counts layer)
#   - hvg_batch_key: source (batch-aware, consistent with seurat run)
#
# combined.h5ad is symlinked from VelWangPsychAD_100k — no need to re-run step1.
# Submit via:
#   sbatch --job-name=snrna_scvi_pearson \
#     --export=ALL,WORK_DIR=...,CONFIG=code/pipeline/pearson_hpc_config.yaml \
#     .../step2_scvi.sh

output_dir: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/VelWangPsychAD_100k_pearson

sources:
  - name: WANG
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/wang/wang.h5ad
    dataset_type: Wang
    cell_type_field: "Type_updated"
    pfc_only: true
    n_cells: 100000

  - name: VELMESHEV
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/velmeshev/velmeshev.h5ad
    dataset_type: Velmeshev
    cell_type_field: "Cell_Type"
    pfc_only: true
    n_cells: 100000

  - name: AGING
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/Aging_Cohort.h5ad
    dataset_type: Aging
    cell_type_field: "subclass"
    pfc_only: true
    n_cells: 100000

  - name: HBCC
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/HBCC_Cohort.h5ad
    dataset_type: HBCC
    cell_type_field: "subclass"
    pfc_only: true
    n_cells: 100000

age_downsample: true
seed: 42

scvi:
  n_top_genes: 10000
  hvg_flavor: pearson_residuals
  hvg_batch_key: source
  n_latent: 30
  max_epochs_scvi: 400
  batch_size: 256
  early_stopping: true
  early_stopping_patience: 20
  num_workers: 4
  transform_batch: WANG    # normalize all cells as WANG cells of their type (for GRN scoring)

scanvi_label_transfer:
  enabled: true
  label_column: cell_type_for_scanvi
  max_epochs_scanvi: 100
  confidence_threshold: 0.5

steps:
  - scvi
overwrite: false
