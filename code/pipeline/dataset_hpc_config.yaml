# snRNAseq Pipeline Config — HPC, Pearson residuals HVG, dataset-level batch correction
#
# Identical to pearson_hpc_config.yaml except:
#   - output_dir: VelWangPsychAD_100k_dataset
#   - batch_key / hvg_batch_key: dataset (instead of source)
#     VELMESHEV is split into its sub-datasets (U01, Ramos, Herring, Trevino);
#     WANG, AGING, HBCC each remain a single batch (dataset == source).
#   - steps: downsample + combine + scvi (full run; combined.h5ad must be
#     rebuilt to include the new 'dataset' obs column added to read_data.py)
#
# Submit via:
#   cd /home/rajd2/rds/hpc-work/snRNAseq_2026
#   bash code/pipeline/slurm/submit_pipeline.sh code/pipeline/dataset_hpc_config.yaml

output_dir: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/VelWangPsychAD_100k_dataset

sources:
  - name: WANG
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/wang/wang.h5ad
    dataset_type: Wang
    cell_type_field: "Type_updated"
    pfc_only: true
    n_cells: 100000

  - name: VELMESHEV
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/velmeshev/velmeshev.h5ad
    dataset_type: Velmeshev
    cell_type_field: "Cell_Type"
    pfc_only: true
    n_cells: 100000

  - name: AGING
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/Aging_Cohort.h5ad
    dataset_type: Aging
    cell_type_field: "subclass"
    pfc_only: true
    n_cells: 100000

  - name: HBCC
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/HBCC_Cohort.h5ad
    dataset_type: HBCC
    cell_type_field: "subclass"
    pfc_only: true
    n_cells: 100000

age_downsample: true
seed: 42

scvi:
  n_top_genes: 10000
  hvg_flavor: pearson_residuals
  hvg_batch_key: dataset
  batch_key: dataset
  n_latent: 30
  max_epochs_scvi: 400
  batch_size: 256
  early_stopping: true
  early_stopping_patience: 20
  num_workers: 4
  transform_batch: WANG    # normalize all cells as WANG cells of their type (for GRN scoring)

scanvi_label_transfer:
  enabled: true
  label_column: cell_type_for_scanvi
  max_epochs_scanvi: 100
  confidence_threshold: 0.5

steps:
  - downsample
  - combine
  - scvi
overwrite: false
