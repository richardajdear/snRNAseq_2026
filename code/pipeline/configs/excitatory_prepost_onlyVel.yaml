# snRNAseq Pipeline Config — HPC, Pearson residuals HVG, prepost + source-chemistry batch correction
#
# Uses a combined per-cell batch column created in downsample.py:
#   source-chemistry = source + '-' + chemistry
#
# Submit via:
#   cd /home/rajd2/rds/hpc-work/snRNAseq_2026
#   bash code/pipeline/slurm/submit_pipeline.sh code/pipeline/excitatory_prepost_tuning4.yaml

output_dir: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/Vel_excitatory_prepost

sources:
  - name: VELMESHEV
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/velmeshev/velmeshev.h5ad
    dataset_type: Velmeshev
    cell_type_field: "Cell_Type"
    pfc_only: true

age_downsample: true
prepost_only: false
cell_class_filter: [Excitatory]
seed: 42

scvi:
  n_top_genes: 15000
  hvg_flavor: pearson_residuals
  hvg_batch_key: source-chemistry
  batch_key: source-chemistry
  n_latent: 50
  n_hidden: 128
  n_layers: 5
  gene_likelihood: zinb
  max_epochs_scvi: 400
  batch_size: 512
  early_stopping: true
  early_stopping_patience: 20
  num_workers: 16
  transform_batch: VELMESHEV-V3
  continuous_covariate_keys: [age_log_pc]
  categorical_covariate_keys: [sex]

scanvi_label_transfer:
  enabled: true
  label_column: cell_type_raw
  max_epochs_scanvi: 100
  confidence_threshold: 0.5

pseudobulk:
  layers:
    - name: counts
      aggregation: sum
    - name: scvi_normalized
      aggregation: mean
    - name: scanvi_normalized
      aggregation: mean
  min_cells: 10
  groups:
    - name: all_cells_by_donor
      group_cols: [individual]

    - name: by_cell_class
      group_cols: [individual, cell_class]

    - name: excitatory_by_celltype
      group_cols: [individual, cell_type_aligned]
      filter:
        cell_class: Excitatory

notebook:
  template: notebooks/templates/grn_dev.qmd

steps:
  # - downsample
  # - combine
  - scvi
  - diagnostics
  - pseudobulk
  - notebook
overwrite: false
