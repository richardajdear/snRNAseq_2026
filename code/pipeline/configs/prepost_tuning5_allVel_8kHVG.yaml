# snRNAseq Pipeline Config — HPC, Pearson residuals HVG (8k), prepost + source-chemistry batch correction
#
# HVG selection is performed at the end of the combine step (CPU), not in scVI.
# 8000 HVGs are selected on the full combined dataset using pearson_residuals.
# combined.h5ad is written with only HVG dimensions; scVI receives this filtered
# matrix in full and does not perform its own gene selection.
#
# Uses a combined per-cell batch column created in downsample.py:
#   source-chemistry = source + '-' + chemistry
#
# Submit via:
#   cd /home/rajd2/rds/hpc-work/snRNAseq_2026
#   bash code/pipeline/slurm/submit_pipeline.sh code/pipeline/configs/prepost_tuning5_allVel_8kHVG.yaml

output_dir: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/VelWangPsychAD_200k_tuning5_allVel_8kHVG

sources:
  - name: WANG
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/wang/wang.h5ad
    dataset_type: Wang
    cell_type_field: "Type_updated"
    pfc_only: true
    n_cells: 200000

  - name: VELMESHEV
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/velmeshev/velmeshev.h5ad
    dataset_type: Velmeshev
    cell_type_field: "Cell_Type"
    pfc_only: true

  - name: PSYCHAD
    paths:
      aging: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/Aging_Cohort.h5ad
      hbcc:  /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/HBCC_Cohort.h5ad
    dataset_type: PsychAD
    cell_type_field: "subclass"
    pfc_only: true
    n_cells: 200000

age_downsample: true
postnatal_only: false
seed: 42

combine:
  n_top_genes: 8000
  hvg_flavor: pearson_residuals
  hvg_batch_key: source-chemistry  # ignored by pearson_residuals; retained for documentation

scvi:
  batch_key: source-chemistry
  n_latent: 30
  n_hidden: 512
  n_layers: 3
  gene_likelihood: zinb
  max_epochs_scvi: 400
  batch_size: 512
  early_stopping: true
  early_stopping_patience: 20
  num_workers: 16
  transform_batch: WANG-multiome
  continuous_covariate_keys: []
  categorical_covariate_keys: [sex]

scanvi_label_transfer:
  enabled: true
  label_column: cell_type_for_scanvi
  max_epochs_scanvi: 100
  scanvi_lr: 0.0001  # 10x lower than default to prevent NaN explosion when fine-tuning from scVI weights
  confidence_threshold: 0.5

pseudobulk:
  layers:
    - name: counts
      aggregation: sum
    - name: scvi_normalized
      aggregation: mean
    - name: scanvi_normalized
      aggregation: mean
  min_cells: 100
  groups:
    - name: by_cell_class
      group_cols: [individual, cell_class]

steps:
  - downsample
  - combine
  - scvi
  - diagnostics
  - pseudobulk
  - notebook
overwrite: false
