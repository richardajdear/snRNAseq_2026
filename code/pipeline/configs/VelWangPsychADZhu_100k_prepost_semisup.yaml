output_dir: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/VelWangPsychADZhu_100k_prepost_semisup

sources:
  - name: WANG
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/wang/wang.h5ad
    dataset_type: Wang
    cell_type_field: "Type_updated"
    pfc_only: true
    n_cells: 100000

  - name: VELMESHEV
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/velmeshev/velmeshev.h5ad
    dataset_type: Velmeshev
    cell_type_field: "Cell_Type"
    pfc_only: true
    n_cells: 100000

  - name: PSYCHAD
    paths:
      aging: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/Aging_Cohort.h5ad
      hbcc:  /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/HBCC_Cohort.h5ad
    dataset_type: PsychAD
    cell_type_field: "subclass"
    pfc_only: true
    n_cells: 100000

  - name: ZHU
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/zhu/zhu.h5ad
    dataset_type: Zhu
    cell_type_field: "author_cell_type"
    pfc_only: false                # dataset already restricted to cortex; both tissues included
    n_cells: null                  # only 45k cells total — use all

downsample:
  use_shared_labels: true
  shared_labels_csv: reference/shared_fine_labels.csv

age_downsample: true
postnatal_only: false
seed: 42

scvi:
  n_top_genes: 10000
  hvg_flavor: pearson_residuals
  hvg_batch_key: source-chemistry
  n_latent: 30
  max_epochs_scvi: 400
  batch_size: 256
  early_stopping: true
  early_stopping_patience: 20
  num_workers: 4
  transform_batch: VELMESHEV-V3
  continuous_covariate_keys: []
  categorical_covariate_keys: [sex]

scanvi_label_transfer:
  enabled: true
  label_column: cell_type_for_scanvi
  max_epochs_scanvi: 200
  confidence_threshold: 0.5

pseudobulk:
  layers:
    - name: counts
      aggregation: sum
    - name: scvi_normalized
      aggregation: mean
    - name: scanvi_normalized
      aggregation: mean
  min_cells: 10
  groups:
    - name: by_cell_class
      group_cols: [individual, cell_class]
    - name: excitatory_by_celltype
      group_cols: [individual, cell_type_aligned]
      filter:
        cell_class: Excitatory
    - name: inhibitory_by_celltype
      group_cols: [individual, cell_type_aligned]
      filter:
        cell_class: Inhibitory

steps:
  - downsample
  - combine
  - scvi
  - diagnostics
  - pseudobulk
overwrite: true
