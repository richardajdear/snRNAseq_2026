# snRNAseq Pipeline Config — Local Testing (10k)
#
# Pipeline steps (run via run_pipeline.py):
#   1. downsample  — per-dataset: read + filter + write individual h5ads
#   2. combine     — concatenate individual h5ads → combined.h5ad
#   3. scvi        — scVI batch correction + scANVI label transfer
#                    (scANVI trained with WANG labels, model.predict() → cell_type_aligned)

# ── Output directory ──────────────────────────────────────────────────────────
# All intermediate and final outputs are written under output_dir.
output_dir: rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/combined/pipeline_test

# ── Per-dataset sources ────────────────────────────────────────────────────────
# Each source is processed individually by downsample.py, then combined.
# cell_type_field: which obs/meta column to store as cell_type_raw (the input
#                 to label transfer).
sources:
  - name: WANG
    path: rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/wang/wang_100k_PFC_lessOld.h5ad
    dataset_type: Wang
    cell_type_field: "Type_updated"   # Wang's curated cell type labels
    pfc_only: true
    n_cells: 10000                    # null = no cell-level downsampling

  - name: VELMESHEV
    path: rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/velmeshev/velmeshev_100k_PFC_lessOld.h5ad
    dataset_type: Velmeshev
    cell_type_field: "Cell_Type"      # from Velmeshev TSV metadata
    pfc_only: true
    n_cells: 10000

  - name: AGING
    path: rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/Aging_Cohort_100k_PFC_lessOld.h5ad
    dataset_type: Aging
    cell_type_field: "subclass"       # PsychAD fine-grained label
    pfc_only: true
    n_cells: 10000

  - name: HBCC
    path: rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/HBCC_Cohort_100k_PFC_lessOld.h5ad
    dataset_type: HBCC
    cell_type_field: "subclass"       # PsychAD fine-grained label
    pfc_only: true
    n_cells: 10000

# ── Downsampling ──────────────────────────────────────────────────────────────
age_downsample: false   # true = keep all <40, 20% of donors ≥40
seed: 42

# ── scVI ──────────────────────────────────────────────────────────────────────
# Delegates to scVI/run_pipeline.py using the combined h5ad as input.
# scvi_config below overrides individual scVI settings.
scvi:
  n_top_genes: 5000
  n_latent: 30
  max_epochs_scvi: 50
  batch_size: 128
  early_stopping: true
  early_stopping_patience: 10
  transform_batch: WANG    # normalize all cells as WANG cells of their type (for GRN scoring)

# ── scANVI label transfer ─────────────────────────────────────────────────────
# Replaces kNN label transfer. scANVI trains jointly on batch correction +
# fine-grained label prediction. WANG cells provide the reference vocabulary
# (cell_type_for_scanvi); all other cells are "Unknown" (unlabelled).
# After training, model.predict() assigns cell_type_aligned to all cells.
# Diagnostics are written automatically to scanvi_diagnostics/.
scanvi_label_transfer:
  enabled: true
  label_column: cell_type_for_scanvi
  max_epochs_scanvi: 50   # early_stopping will cut short when converged
  confidence_threshold: 0.5

# ── Pipeline control ──────────────────────────────────────────────────────────
steps:
  - downsample
  - combine
  - scvi
overwrite: false
