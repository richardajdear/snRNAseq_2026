# snRNAseq Pipeline Config — Local Testing (10k)
#
# Pipeline steps (run via run_pipeline.py):
#   1. downsample  — per-dataset: read + filter + write individual h5ads
#   2. combine     — concatenate individual h5ads → combined.h5ad
#   3. scvi        — scVI batch correction + scANVI label transfer
#                    (scANVI trained with WANG labels, model.predict() → cell_type_aligned)
#   4. pseudobulk  — aggregate integrated.h5ad by donor (× cell type) → pseudobulk_output/

# ── Output directory ──────────────────────────────────────────────────────────
# All intermediate and final outputs are written under output_dir.
output_dir: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/pipeline_test

# ── Per-dataset sources ────────────────────────────────────────────────────────
# Each source is processed individually by downsample.py, then combined.
# cell_type_field: which obs/meta column to store as cell_type_raw (the input
#                 to label transfer).
sources:
  - name: WANG
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/wang/wang.h5ad
    dataset_type: Wang
    cell_type_field: "Type_updated"   # Wang's curated cell type labels
    pfc_only: true
    n_cells: 10000                    # set to null (or omit) to use all cells

  - name: VELMESHEV
    path: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/velmeshev/velmeshev.h5ad
    dataset_type: Velmeshev
    cell_type_field: "Cell_Type"      # from Velmeshev TSV metadata
    pfc_only: true
    n_cells: 10000                    # set to null (or omit) to use all cells

  - name: PSYCHAD
    paths:
      aging: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/Aging_Cohort.h5ad
      hbcc:  /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_PsychAD/RNAseq/HBCC_Cohort.h5ad
    dataset_type: PsychAD
    cell_type_field: "subclass"       # PsychAD fine-grained label
    pfc_only: true
    n_cells: 10000                    # set to null (or omit) to use all cells

# ── Downsampling ──────────────────────────────────────────────────────────────
age_downsample: false   # true = keep all <40, 20% of donors ≥40
seed: 42

# ── scVI ──────────────────────────────────────────────────────────────────────
# Delegates to scVI/run_pipeline.py using the combined h5ad as input.
# scvi_config below overrides individual scVI settings.
scvi:
  n_top_genes: 5000
  n_latent: 30
  max_epochs_scvi: 50
  batch_size: 128
  early_stopping: true
  early_stopping_patience: 10
  transform_batch: WANG    # normalize all cells as WANG cells of their type (for GRN scoring)

# ── scANVI label transfer ─────────────────────────────────────────────────────
# Replaces kNN label transfer. scANVI trains jointly on batch correction +
# fine-grained label prediction. WANG cells provide the reference vocabulary
# (cell_type_for_scanvi); all other cells are "Unknown" (unlabelled).
# After training, model.predict() assigns cell_type_aligned to all cells.
# Diagnostics are written automatically to scanvi_diagnostics/.
scanvi_label_transfer:
  enabled: true
  label_column: cell_type_for_scanvi
  max_epochs_scanvi: 50   # early_stopping will cut short when converged
  confidence_threshold: 0.5

# ── Pseudobulk ────────────────────────────────────────────────────────────────
# Aggregates the integrated h5ad by donor (× optional cell type).
# Produces one .h5ad per entry in groups, written to pseudobulk_output/.
#
# layers: which layers to aggregate and how.
#   aggregation: sum  → summed raw counts (correct input for DESeq2/edgeR)
#   aggregation: mean → per-cell average (continuous downstream analyses)
#   Layers not present in the integrated h5ad are silently skipped.
#
# groups: each entry produces one output file named {name}.h5ad.
#   group_cols: obs columns that define each pseudobulk sample.
#               Always include 'individual'; add cell-type cols for finer splits.
#   filter:     optional {col: val} to restrict which cells are included.
pseudobulk:
  layers:
    - name: counts
      aggregation: sum
    - name: scvi_normalized
      aggregation: mean
    - name: scanvi_normalized
      aggregation: mean
  min_cells: 10   # drop pseudobulk samples with fewer than N contributing cells
  groups:
    - name: all_cells_by_donor
      group_cols: [individual]

    - name: by_cell_class
      group_cols: [individual, cell_class]

    - name: excitatory_by_celltype
      group_cols: [individual, cell_type_aligned]
      filter:
        cell_class: Excitatory

    - name: inhibitory_by_celltype
      group_cols: [individual, cell_type_aligned]
      filter:
        cell_class: Inhibitory

# ── Pipeline control ──────────────────────────────────────────────────────────
steps:
  - downsample
  - combine
  - scvi
  - pseudobulk
overwrite: false
