# scVI hyperparameter tuning config — linear vs nonlinear decoder comparison.
# Run with: PYTHONPATH=code python -m tuning.tune_scvi_batch --config code/tuning/linear_vs_nonlinear_tuning_config.yaml
#
# Purpose: benchmark LinearDecoderSCVI (LDVAE) against standard scVI across
#   matched architectural hyperparameters, using the latent-space metrics
#   (conditioned chemistry mixing + developmental age preservation).
#
# Key questions:
#   1. Does a linear decoder preserve the developmental age gradient as well as
#      a nonlinear decoder? (age_pres_score)
#   2. Does a linear decoder achieve comparable chemistry mixing? (chem_mixing_score)
#   3. Does n_hidden=1024 improve on 512, which was the best in round 5?
#
# LinearDecoderSCVI replaces the nonlinear decoder with a single linear layer.
# Each latent dimension maps linearly to genes (gene programs), making the latent
# space interpretable for GRN analysis via model.get_loadings().
# The encoder architecture is identical for both decoder types.
#
# NOTE: LinearDecoderSCVI does not support gene_likelihood=zinb.
#   Trials with decoder_type=linear and gene_likelihood=zinb are automatically
#   demoted to nb; this is logged per trial and recorded in trial_results.csv.

input_h5ad: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/VelWangPsychAD_100k_source-chemistry/combined.h5ad
output_dir: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/VelWangPsychAD_100k_source-chemistry/scvi_tuning_ldvae_comparison

batch_key: source-chemistry
age_key: age_years
cell_type_key: cell_class
counts_layer: counts

# Match production covariates exactly.
continuous_covariate_keys: []
categorical_covariate_keys: [sex]

hvg:
  n_top_genes: 15000
  hvg_flavor: pearson_residuals

tuning:
  random_seed: 42
  n_trials: 40             # 16 combinations (2×2×2×2×1×1); 40 trials = 2.5× exhaustive coverage
  max_hours: 22.0          # 2h buffer inside a 24h SLURM wall; linear decoder trains faster
  max_cells: 120000        # stratified subsample; ~40% of full 300k dataset
  num_workers: 4
  scanvi_top_k: 3          # evaluate top-3 scVI trials with scANVI post-loop

training:
  max_epochs_scvi: 400
  early_stopping: true
  early_stopping_patience: 20
  train_size: 0.9
  max_epochs_scanvi: 50

# Search space: decoder_type added alongside architecture.
#
# decoder_type: "nonlinear" = standard SCVI (nonlinear MLP decoder)
#               "linear"    = LinearDecoderSCVI (single linear layer decoder)
#
# gene_likelihood: fixed at "zinb".  Linear decoder does not support zinb and is
#   automatically demoted to nb per trial; nonlinear uses zinb as in round 5.
#   This means linear trials are always nb — a known limitation, but keeping zinb
#   here avoids doubling the search space and is consistent with round 5 nonlinear runs.
#
# n_hidden: [512, 1024] — round 5 found 512 > 256 > 128 clearly; testing whether
#   1024 improves further on both chemistry mixing and age preservation.
#   For the linear decoder, n_hidden only affects the encoder (decoder is a single
#   linear layer regardless), so n_hidden=1024 gives the encoder richer intermediate
#   representations while keeping the interpretable linear gene-program mapping.
#
# n_layers: [3, 5] — round 5 found n_layers=3 optimal for balance; n_layers=5
#   maximises chemistry mixing at the cost of age preservation.  Testing both here
#   to characterise whether linear decoder shifts this trade-off.
#
# Architecture constraint: n_hidden >= 2×n_latent satisfied for all combos
#   (512 ≥ 2×50=100; 1024 ≥ 100).
#
# Space size: 2 × 2 × 2 × 2 × 1 × 1 = 16 combinations
search_space:
  decoder_type: ["nonlinear", "linear"]
  n_latent: [30, 50]
  n_hidden: [512, 1024]
  n_layers: [3, 5]
  gene_likelihood: ["zinb"]
  batch_size: [512]

# Metric: latent-space metrics, matching round 5 exactly.
#
# Metric 1 — Conditioned chemistry mixing (weight: 0.5)
#   kNN Shannon entropy of source-chemistry labels within age_bin × cell_type strata
#   in the LATENT SPACE.  For the linear decoder this is the same latent space as
#   the nonlinear decoder — the encoder architecture is identical.
#
# Metric 2 — Developmental age preservation (weight: 0.5)
#   kNN regression R² of log(age_years) from the latent representation, per cell_type.
#   Key question: does the linear decoder's constrained output structure affect the
#   encoder's ability to organise the latent space along the developmental axis?
metric:
  age_bin_edges: [-1.0, -0.5, -0.38, -0.27, -0.15, -0.05, 0.0, 1.0, 5.0, 12.0, 20.0, 40.0, 90.0]
  k_neighbors: 50
  min_cells_per_bin: 100
  min_cells_per_group: 75
  min_cells_per_type: 150
  weights:
    chem_mixing: 0.5
    age_preservation: 0.5
    lineage_coherence: 0.0
