# scVI hyperparameter tuning config — source-chemistry batch correction.
# Run with: PYTHONPATH=code python -m tuning.tune_scvi_batch --config code/tuning/source-chemistry_tuning_config.yaml
#
# If combined.h5ad has been deleted by the pipeline, the script automatically
# rebuilds it from scvi_output/integrated.h5ad using backed reads (layers['counts']).
#
# --- Run history ---
# Run 1 (scvi_tuning_round2): 25 trials, search space included n_hidden=[32, 64, 128],
#   n_latent=[20..60], batch_size=[256, 512].  Results were invalid: all top-10
#   trials used n_hidden=32.  Diagnosis: n_hidden=32 < n_latent=60 is a degenerate
#   architecture — the encoder bottleneck is narrower than the latent space, so the
#   model cannot learn structured geometry.  The resulting diffuse latent cloud
#   maximises neighbourhood batch-mixing entropy by accident, gaming the objective.
#   The downstream UMAP showed large structureless blobs confirming the collapse.
# Run 2 (scvi_tuning_round3, this config): n_hidden constrained to [128, 256] so
#   n_hidden >= 2×n_latent for all combinations.  batch_size=256 dropped (no
#   meaningful effect at this scale with early stopping).  silhouette_weight raised
#   from 0.2 → 0.35 for a stronger biological-preservation signal.  kNN cell-type
#   purity was considered but deferred: computing it requires scANVI-derived unified
#   labels, creating a circular dependency with the latent space being optimised.

input_h5ad: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/VelWangPsychAD_100k_source-chemistry/combined.h5ad
output_dir: /home/rajd2/rds/rds-cam-psych-transc-Pb9UGUlrwWc/Cam_snRNAseq/integrated/VelWangPsychAD_100k_source-chemistry/scvi_tuning_round3

batch_key: source-chemistry
age_key: age_years
cell_type_key: cell_class
counts_layer: counts

# Match production covariates exactly.
continuous_covariate_keys: [age_log_pc]
categorical_covariate_keys: [sex]

hvg:
  n_top_genes: 15000
  hvg_flavor: pearson_residuals
  # hvg_batch_key is ignored for pearson_residuals (not supported by scanpy).

tuning:
  random_seed: 42
  n_trials: 22           # 32 valid combinations; 22 trials ≈ 68% coverage
  max_hours: 11.0        # 1h buffer inside the 12h SLURM wall
  max_cells: 120000      # stratified subsample; ~40% of full 300k dataset
  num_workers: 4
  scanvi_top_k: 3        # evaluate top-3 scVI trials with scANVI post-loop

training:
  # Use the production epoch horizon so tuned architecture is valid at full scale.
  # NOTE: max_epochs_scvi from this file is NOT copied into best_hyperparameters.yaml
  # to avoid accidentally overriding the production value when the user applies results.
  max_epochs_scvi: 400
  early_stopping: true
  early_stopping_patience: 20
  train_size: 0.9
  max_epochs_scanvi: 50   # short scANVI fine-tune for top-trial comparison

# Search space: model architecture + gene likelihood only.
# lr / weight_decay / dropout_rate use scVI defaults — they are secondary to
# architecture for batch integration quality and do not plumb back to production.
#
# n_hidden constrained to [128, 256]: enforces n_hidden >= 2×n_latent across all
# combinations, preventing the degenerate encoder bottleneck seen in run 1.
# n_hidden=32 and n_hidden=64 excluded entirely.
# batch_size fixed at 512: no meaningful quality effect at this scale with early
# stopping; dropping 256 frees trial budget for architecture exploration.
#
# Space size: 4 × 2 × 2 × 2 × 1 = 32 combinations
search_space:
  n_latent: [30, 40, 50, 60]
  n_hidden: [128, 256]
  n_layers: [4, 5]
  gene_likelihood: ["nb", "zinb"]
  batch_size: [512]

# Objective = weighted age-bin batch mixing (65%) + per-age-bin cell-type silhouette (35%).
# silhouette_weight raised from 0.2 → 0.35 to strengthen the biological-preservation
# signal and reduce susceptibility to architectures that game mixing entropy via
# latent-space collapse.  cell_type_key=cell_class (Excitatory/Inhibitory/Non-neuronal)
# provides a batch-consistent cell-type label without requiring scANVI label transfer.
# Prenatal bins are upweighted because this is currently the least integrated region.
# Entropy is normalised by log(n_batches_global) so prenatal bins with fewer batches
# present are NOT artificially inflated relative to postnatal bins.
#
# Prenatal bin edges are set finer than run 1 (~5-7 gestational week windows) to
# co-locate Wang donors (discrete GW ages) with Velmeshev donors at similar ages.
# Run the job once with the prenatal age distribution log (printed at startup) to
# verify that Wang and Velmeshev cells share each bin; adjust edges if they don't.
#
# GW↔age_years mapping (age = (GW - 40) / 52, negative = before birth):
#   GW14 ≈ -0.50    GW20 ≈ -0.38    GW26 ≈ -0.27
#   GW33 ≈ -0.13    GW37 ≈ -0.06    GW40 =  0.00
metric:
  age_bin_edges: [-1.0, -0.5, -0.38, -0.27, -0.15, -0.05, 0.0, 1.0, 5.0, 12.0, 20.0, 40.0, 90.0]
  prenatal_weight: 2.0
  k_neighbors: 20
  min_cells_per_bin: 100      # lowered from 200 to capture finer prenatal bins
  min_cells_per_group: 75
  silhouette_weight: 0.35
  max_silhouette_cells_per_bin: 5000   # per-bin cap; avoids global silhouette age artefact
