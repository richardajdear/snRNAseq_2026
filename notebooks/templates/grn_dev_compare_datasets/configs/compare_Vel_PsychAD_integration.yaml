# Loads both Velmeshev and PsychAD subsets from the jointly-integrated
# 3-dataset pseudobulk (VelWangPsychAD_200k_prepost_noage_tuning5_allVel),
# using source_filter to separate donor origins. Cell class labels are
# cross-dataset harmonised (joint scANVI). Wang donors are excluded by the
# source filters; all_cells is not available locally.
EXPERIMENT_NAME: compare_Vel_PsychAD_integration
DATASETS:
  - name: Velmeshev
    by_cell_class: ${RDS_ROOT}/Cam_snRNAseq/integrated/VelWangPsychAD_200k_prepost_noage_tuning5_allVel/pseudobulk_output/by_cell_class.h5ad
    all_cells:     null
    cell_class_col: cell_class
    source_filter:  VELMESHEV
  - name: PsychAD
    by_cell_class: ${RDS_ROOT}/Cam_snRNAseq/integrated/VelWangPsychAD_200k_prepost_noage_tuning5_allVel/pseudobulk_output/by_cell_class.h5ad
    all_cells:     null
    cell_class_col: cell_class
    source_filter:  PSYCHAD
CELL_CLASSES: [Excitatory, Inhibitory, Astrocytes, Microglia, OPC, Oligos]
CHILD_STARTS: [1, 2, 3, 4, 5]
GAP_STARTS:   [8, 9, 10, 11, 12, 13, 14]
GAP_LENGTHS:  [0, 1, 2, 3, 4]
ADOL_ENDS:    [18, 20, 22, 24, 26]
N_VALUES:     [4000]
